<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block page_name %}{{ page_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<nav class="navbar is-info" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item" href="{{ url_for('home') }}">
                <strong>Cats on Skis 🐱⛷️</strong>
        </a>
    </div>
<div class="navbar-menu is-active">
            <div class="navbar-start">
                <a class="navbar-item" href="{{ url_for('home') }}">Home</a>
                <a class="navbar-item" href="{{ url_for('all_pages') }}">Pages</a>
                <a class="navbar-item" href="{{ url_for('about') }}">About</a>
            </div>
        </div>
    </nav>
<section class="section">
        <div class="container">
            <div class="content">
                {% block content %}{{ page_content }}{% endblock %}
            </div>
        </div>
    </section>
</body>

</html>
